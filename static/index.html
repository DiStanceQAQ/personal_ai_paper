<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地论文知识引擎</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px;
            color: #333;
            line-height: 1.6;
            background: #fafafa;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e0e0e0;
        }

        h1 { font-size: 1.6rem; color: #1a1a2e; }
        h2 { font-size: 1.15rem; color: #444; margin-bottom: 12px; }

        /* Active Space Banner */
        .active-banner {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .active-banner .label { font-weight: 600; color: #1565c0; }
        .active-banner .name { color: #0d47a1; margin-left: 6px; }
        .active-banner .none { color: #999; font-style: italic; }

        /* Form */
        .create-form {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #555; }
        .form-group input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 2px rgba(25,118,210,0.15);
        }

        /* Buttons */
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .btn-primary { background: #1976d2; color: #fff; }
        .btn-primary:hover { background: #1565c0; }
        .btn-success { background: #2e7d32; color: #fff; }
        .btn-success:hover { background: #1b5e20; }
        .btn-outline { background: #fff; color: #1976d2; border: 1px solid #1976d2; }
        .btn-outline:hover { background: #e3f2fd; }
        .btn-danger { background: #fff; color: #c62828; border: 1px solid #c62828; }
        .btn-danger:hover { background: #ffebee; }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

        /* Space List */
        .space-list { list-style: none; }
        .space-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .space-item.active-space { border-color: #1976d2; background: #f5f9ff; }
        .space-info { flex: 1; min-width: 0; }
        .space-name { font-weight: 600; font-size: 0.95rem; }
        .space-desc { font-size: 0.85rem; color: #666; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .space-meta { font-size: 0.78rem; color: #999; margin-top: 2px; }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-archived { background: #fff3e0; color: #e65100; }

        .space-actions { display: flex; gap: 4px; }

        /* Inline Edit */
        .inline-edit { display: none; }
        .inline-edit input {
            padding: 4px 8px;
            border: 1px solid #1976d2;
            border-radius: 4px;
            font-size: 0.9rem;
            width: 100%;
        }

        /* Description Edit */
        .desc-edit-area {
            display: none;
            margin-top: 8px;
        }
        .desc-edit-area textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #1976d2;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
        }
        .desc-edit-actions { display: flex; gap: 6px; margin-top: 6px; }

        /* Error / Empty states */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state p { margin-bottom: 12px; }
        .error-toast {
            position: fixed;
            top: 16px;
            right: 16px;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
            z-index: 1000;
        }

        /* Upload Zone */
        .upload-section { margin-bottom: 24px; }
        .upload-zone {
            border: 2px dashed #90caf9;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            background: #f8fbff;
            color: #555;
            transition: all 0.2s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #1976d2; background: #e3f2fd; }
        .upload-zone input[type="file"] { display: none; }

        /* Paper List */
        .paper-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .paper-info { flex: 1; min-width: 0; }
        .paper-title { font-weight: 600; font-size: 0.9rem; }
        .paper-meta { font-size: 0.78rem; color: #999; margin-top: 2px; }
        .parse-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }
        .parse-pending { background: #fff3e0; color: #e65100; }
        .parse-parsed { background: #e8f5e9; color: #2e7d32; }
        .parse-error { background: #ffebee; color: #c62828; }

        /* Agent Access Toggle */
        .agent-controls {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .agent-controls .agent-info { font-size: 0.85rem; color: #555; }
        .agent-controls .agent-info .space-exposed { font-weight: 600; color: #0d47a1; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .toggle-slider { background-color: #2e7d32; }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(22px); }

        #papersSection { display: none; }
    </style>
</head>
<body>
    <div id="errorToast" class="error-toast"></div>

    <header>
        <h1>&#x1F4DA; 本地论文知识引擎</h1>
    </header>

    <!-- Active Space Banner -->
    <div class="active-banner" id="activeBanner">
        <div>
            <span class="label">当前空间：</span>
            <span class="name" id="activeSpaceName">未选择</span>
        </div>
    </div>

    <!-- Agent Access Controls -->
    <div class="agent-controls" id="agentControls">
        <div class="agent-info">
            <div><strong>智能代理访问（MCP）</strong> — 传输方式：<code>stdio</code></div>
            <div style="margin-top:2px;">暴露空间：<span class="space-exposed" id="agentExposedSpace">无</span></div>
        </div>
        <label class="toggle-switch" title="启用或关闭本地智能代理访问">
            <input type="checkbox" id="agentToggle" onchange="toggleAgentAccess()">
            <span class="toggle-slider"></span>
        </label>
    </div>

    <!-- Create Space Form -->
    <div class="create-form">
        <h2>创建新的想法空间</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="newName">空间名称 *</label>
                <input type="text" id="newName" placeholder="例如：注意力机制综述" required>
            </div>
            <div class="form-group">
                <label for="newDesc">描述</label>
                <input type="text" id="newDesc" placeholder="研究目标、假设或关注问题...">
            </div>
            <button class="btn-primary" onclick="createSpace()">+ 创建</button>
        </div>
    </div>

    <!-- Papers Section (visible when space is active) -->
    <div id="papersSection">
        <div class="upload-section">
            <h2>导入论文</h2>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <p><strong>拖拽 PDF 到这里</strong>，或点击选择文件</p>
                <p style="font-size:0.85rem;color:#999;margin-top:4px;">仅支持 PDF 文件</p>
                <input type="file" id="fileInput" accept=".pdf,application/pdf" onchange="handleFileSelect(event)">
            </div>
        </div>

        <!-- Search -->
        <div style="margin-bottom:24px;">
            <h2>文献检索</h2>
            <div style="display:flex; gap:8px;">
                <input type="text" id="searchInput" placeholder="搜索方法、指标、结果..." onkeydown="if(event.key==='Enter')searchLiterature()"
                    style="flex:1; padding:8px 12px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;">
                <button class="btn-primary" onclick="searchLiterature()">搜索</button>
            </div>
            <div id="searchResults" style="margin-top:12px;"></div>
        </div>

        <h2>论文列表</h2>
        <ul class="space-list" id="papersList">
            <li class="empty-state"><p>还没有导入论文。请在上方上传 PDF。</p></li>
        </ul>
        <!-- Paper Detail / Edit -->
        <div id="paperDetail" style="display:none; background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:20px; margin-top:12px;">
            <h2 id="paperDetailTitle" style="margin-bottom:16px;">论文详情</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="editTitle">
                </div>
                <div class="form-group">
                    <label>作者</label>
                    <input type="text" id="editAuthors" placeholder="例如：Jane Doe, John Smith">
                </div>
                <div class="form-group">
                    <label>年份</label>
                    <input type="number" id="editYear" placeholder="2024">
                </div>
                <div class="form-group">
                    <label>DOI</label>
                    <input type="text" id="editDoi" placeholder="10.xxx/xxx">
                </div>
                <div class="form-group">
                    <label>arXiv ID</label>
                    <input type="text" id="editArxiv" placeholder="2301.xxxxx">
                </div>
                <div class="form-group">
                    <label>PubMed ID</label>
                    <input type="text" id="editPubmed" placeholder="12345678">
                </div>
            </div>
            <div class="form-group" style="margin-top:12px;">
                <label>会议 / 期刊</label>
                <input type="text" id="editVenue" placeholder="会议或期刊名称">
            </div>
            <div class="form-group" style="margin-top:12px;">
                <label>摘要</label>
                <textarea id="editAbstract" rows="3" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-family:inherit; font-size:0.9rem;"></textarea>
            </div>
            <div class="form-group" style="margin-top:12px;">
                <label>引用 / BibTeX</label>
                <textarea id="editCitation" rows="2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-family:monospace; font-size:0.85rem;" placeholder="在这里粘贴 BibTeX 条目"></textarea>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">
                <div class="form-group">
                    <label>用户标签（逗号分隔）</label>
                    <input type="text" id="editTags" placeholder="重要, 综述">
                </div>
                <div class="form-group">
                    <label>与想法的关系</label>
                    <select id="editRelation" style="padding:8px; border:1px solid #ccc; border-radius:6px; font-size:0.9rem;">
                        <option value="unclassified">未分类</option>
                        <option value="supports">支持</option>
                        <option value="refutes">反驳</option>
                        <option value="inspires">启发</option>
                        <option value="baseline">基线</option>
                        <option value="method_source">方法来源</option>
                        <option value="background">背景资料</option>
                        <option value="result_comparison">结果对比</option>
                    </select>
                </div>
            </div>
            <div style="margin-top:16px; display:flex; gap:8px;">
                <button class="btn-primary" onclick="savePaperMeta()">保存元数据</button>
                <button class="btn-success" onclick="parsePaper()">解析 PDF</button>
            </div>
            <div id="paperParseStatus" style="margin-top:8px; font-size:0.85rem;"></div>
            <div id="paperCards" style="margin-top:16px;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <h3 style="font-size:1rem;">知识卡片</h3>
                    <button class="btn-outline btn-sm" onclick="showCreateCard()">+ 添加卡片</button> <button class="btn-outline btn-sm" onclick="extractCards()">自动抽取</button>
                </div>
                <div id="cardCreateForm" style="display:none; border:1px solid #1976d2; border-radius:6px; padding:12px; margin-bottom:8px;">
                    <div class="form-group" style="margin-bottom:8px;">
                        <label>卡片类型</label>
                        <select id="newCardType" style="padding:6px; border:1px solid #ccc; border-radius:4px; width:100%;">
                            <option value="Method">方法</option><option value="Result">结果</option>
                            <option value="Claim">主张</option><option value="Evidence">证据</option>
                            <option value="Metric">指标</option><option value="Limitation">局限性</option>
                            <option value="Failure Mode">失败模式</option><option value="Problem">问题</option>
                            <option value="Object">研究对象</option><option value="Variable">变量</option>
                            <option value="Interpretation">解释</option><option value="Practical Tip">实践建议</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:8px;">
                        <label>摘要</label>
                        <textarea id="newCardSummary" rows="2" style="width:100%; padding:6px; border:1px solid #ccc; border-radius:4px; font-family:inherit;"></textarea>
                    </div>
                    <div style="display:flex; gap:6px;">
                        <button class="btn-primary btn-sm" onclick="createCard()">创建</button>
                        <button class="btn-outline btn-sm" onclick="document.getElementById('cardCreateForm').style.display='none'">取消</button>
                    </div>
                </div>
                <div id="cardsList"></div>
            </div>

            <div id="paperPassages" style="margin-top:16px;">
                <h3 style="font-size:1rem; margin-bottom:8px;">原文片段</h3>
                <div id="passagesList"></div>
            </div>
        </div>
    </div>

    <!-- Structured Views -->
    <div id="structuredViews" style="display:none; margin-top:20px;">
        <h2>结构化文献视图</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
            <button class="btn-outline btn-sm view-tab active" onclick="showCardView('Method')">方法</button>
            <button class="btn-outline btn-sm view-tab" onclick="showCardView('Metric')">指标</button>
            <button class="btn-outline btn-sm view-tab" onclick="showCardView('Result')">结果</button>
            <button class="btn-outline btn-sm view-tab" onclick="showCardView('Failure Mode')">失败模式</button>
            <button class="btn-outline btn-sm view-tab" onclick="showCardView('Limitation')">局限性</button>
            <button class="btn-outline btn-sm view-tab" onclick="showCardView('Claim')">主张</button>
        </div>
        <div id="structuredViewContent"></div>
    </div>


    <!-- Space List -->
    <h2>想法空间</h2>
    <ul class="space-list" id="spaceList">
        <li class="empty-state">
            <p>暂无想法空间。</p>
            <p>请先在上方创建第一个空间。</p>
        </li>
    </ul>

    <script>
        const API = '/api/spaces';

        function showError(msg) {
            const el = document.getElementById('errorToast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        async function api(path, options = {}) {
            const res = await fetch(API + path, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            if (!res.ok && res.status !== 404) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `Request failed: ${res.status}`);
            }
            return res;
        }

        async function loadSpaces() {
            try {
                const res = await api('');
                const spaces = await res.json();
                let activeId = null;
                try {
                    const aRes = await api('/active');
                    if (aRes.ok) {
                        const active = await aRes.json();
                        activeId = active.id;
                        document.getElementById('activeSpaceName').textContent = active.name;
                    } else {
                        document.getElementById('activeSpaceName').textContent = '未选择';
                    }
                } catch (e) {
                    document.getElementById('activeSpaceName').textContent = '未选择';
                }

                const list = document.getElementById('spaceList');
                if (spaces.length === 0) {
                    list.innerHTML = '<li class="empty-state"><p>暂无想法空间。</p><p>请先在上方创建第一个空间。</p></li>';
                    return;
                }

                list.innerHTML = spaces.map(s => {
                    const isActive = s.id === activeId;
                    const statusBadge = s.status === 'active'
                        ? `<span class="badge badge-active">活跃</span>`
                        : `<span class="badge badge-archived">已归档</span>`;
                    
                    return `
                    <li class="space-item ${isActive ? 'active-space' : ''}" id="space-${s.id}">
                        <div class="space-info">
                            <div class="space-name">
                                <span class="display-name" id="dname-${s.id}">${esc(s.name)}</span>
                                <span class="inline-edit" id="ename-${s.id}">
                                    <input type="text" value="${esc(s.name)}" id="iname-${s.id}">
                                </span>
                                ${statusBadge}
                                ${isActive ? '<span class="badge badge-active" style="margin-left:4px;">当前</span>' : ''}
                            </div>
                            <div class="space-desc">
                                <span class="display-desc" id="ddesc-${s.id}">${esc(s.description || '暂无描述')}</span>
                            </div>
                            <div class="desc-edit-area" id="edesc-area-${s.id}">
                                <textarea id="edesc-${s.id}">${esc(s.description || '')}</textarea>
                                <div class="desc-edit-actions">
                                    <button class="btn-primary btn-sm" onclick="saveDesc('${s.id}')">保存</button>
                                    <button class="btn-outline btn-sm" onclick="cancelDescEdit('${s.id}')">取消</button>
                                </div>
                            </div>
                            <div class="space-meta">创建：${s.created_at} | 更新：${s.updated_at}</div>
                        </div>
                        <div class="space-actions">
                            ${s.status === 'active' && !isActive
                                ? `<button class="btn btn-outline btn-sm" onclick="setActive('${s.id}')">打开</button>`
                                : ''}
                            <button class="btn btn-outline btn-sm" id="rename-btn-${s.id}" onclick="startRename('${s.id}')">重命名</button>
                            <span class="inline-edit" id="erename-actions-${s.id}">
                                <button class="btn-primary btn-sm" onclick="saveRename('${s.id}')">保存</button>
                                <button class="btn-outline btn-sm" onclick="cancelRename('${s.id}')">取消</button>
                            </span>
                            <button class="btn btn-outline btn-sm" onclick="startDescEdit('${s.id}')">编辑描述</button>
                            ${s.status === 'active'
                                ? `<button class="btn btn-outline btn-sm" onclick="archiveSpace('${s.id}')">归档</button>`
                                : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteSpace('${s.id}')">删除</button>
                        </div>
                    </li>`;
                }).join('');
            } catch (e) {
                showError(e.message);
            }
        }

        function esc(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function tParseStatus(status) {
            const labels = {
                pending: '待解析',
                parsing: '解析中',
                parsed: '已解析',
                error: '解析失败'
            };
            return labels[status] || status;
        }

        function tSection(value) {
            const labels = {
                abstract: '摘要',
                introduction: '引言',
                method: '方法',
                result: '结果',
                discussion: '讨论',
                limitation: '局限性',
                appendix: '附录',
                body: '正文'
            };
            return labels[value] || value || '正文';
        }

        function tCardType(value) {
            const labels = {
                'Problem': '问题',
                'Claim': '主张',
                'Evidence': '证据',
                'Method': '方法',
                'Object': '研究对象',
                'Variable': '变量',
                'Metric': '指标',
                'Result': '结果',
                'Failure Mode': '失败模式',
                'Interpretation': '解释',
                'Limitation': '局限性',
                'Practical Tip': '实践建议'
            };
            return labels[value] || value;
        }

        async function createSpace() {
            const name = document.getElementById('newName').value.trim();
            const desc = document.getElementById('newDesc').value.trim();
            if (!name) { showError('请输入空间名称。'); return; }
            try {
                await api('', {
                    method: 'POST',
                    body: JSON.stringify({ name, description: desc }),
                    headers: { 'Content-Type': 'application/json' }
                });
                document.getElementById('newName').value = '';
                document.getElementById('newDesc').value = '';
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        async function setActive(id) {
            try {
                await api('/active/' + id, { method: 'PUT' });
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        function startRename(id) {
            document.getElementById('dname-' + id).style.display = 'none';
            document.getElementById('ename-' + id).style.display = 'inline';
            document.getElementById('erename-actions-' + id).style.display = 'inline';
            document.getElementById('rename-btn-' + id).style.display = 'none';
            document.getElementById('iname-' + id).focus();
            document.getElementById('iname-' + id).select();
        }

        async function saveRename(id) {
            const name = document.getElementById('iname-' + id).value.trim();
            if (!name) { showError('名称不能为空。'); return; }
            try {
                await api('/' + id, {
                    method: 'PATCH',
                    body: JSON.stringify({ name })
                });
                cancelRename(id);
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        function cancelRename(id) {
            document.getElementById('dname-' + id).style.display = 'inline';
            document.getElementById('ename-' + id).style.display = 'none';
            document.getElementById('erename-actions-' + id).style.display = 'none';
            document.getElementById('rename-btn-' + id).style.display = 'inline';
        }

        function startDescEdit(id) {
            document.getElementById('edesc-area-' + id).style.display = 'block';
            document.getElementById('edesc-' + id).focus();
        }

        async function saveDesc(id) {
            const desc = document.getElementById('edesc-' + id).value.trim();
            try {
                await api('/' + id, {
                    method: 'PATCH',
                    body: JSON.stringify({ description: desc })
                });
                cancelDescEdit(id);
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        function cancelDescEdit(id) {
            document.getElementById('edesc-area-' + id).style.display = 'none';
        }

        async function archiveSpace(id) {
            if (!confirm('要归档这个空间吗？数据会保留，但不会出现在活跃视图中。')) return;
            try {
                await api('/' + id + '/archive', { method: 'PATCH' });
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        async function deleteSpace(id) {
            if (!confirm('要删除这个空间吗？数据会保留，但该空间会被隐藏。')) return;
            try {
                await api('/' + id, { method: 'DELETE' });
                await loadSpaces();
            } catch (e) { showError(e.message); }
        }

        // --- Drag and Drop ---
        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('dragover'); });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) uploadFile(files[0]);
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('仅支持 PDF 文件。');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/api/papers/upload', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Upload failed');
                }
                await loadPapers();
            } catch (e) { showError(e.message); }
        }


        // --- 文献检索 ---
        async function searchLiterature() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<p style="color:#999;">正在搜索...</p>';
            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q) + '&limit=30');
                if (!res.ok) { resultsDiv.innerHTML = '<p style="color:#c62828;">搜索前需要先打开一个空间。</p>'; return; }
                const results = await res.json();
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<p style="color:#999;">没有找到与“' + esc(q) + '”相关的结果。</p>';
                    return;
                }
                resultsDiv.innerHTML = results.map(r => `
                    <div style="border:1px solid #e0e0e0; border-radius:6px; padding:10px; margin-bottom:8px; cursor:pointer;"
                         onclick="viewPaper('${r.paper_id}')">
                        <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px; flex-wrap:wrap;">
                            <strong style="font-size:0.85rem;">${esc(r.paper_title || r.paper_id)}</strong>
                            <span class="parse-badge" style="background:#e3f2fd;color:#1565c0;">${esc(tSection(r.section))}</span>
                            <span style="font-size:0.78rem;color:#999;">第 ${r.page_number} 页</span>
                            <span style="font-size:0.75rem;color:#bbb;">分数：${r.score.toFixed(2)}</span>
                        </div>
                        <div style="font-size:0.85rem; line-height:1.5; color:#444;">${r.snippet}</div>
                    </div>
                `).join('');
            } catch (e) { resultsDiv.innerHTML = '<p style="color:#c62828;">搜索出错：' + esc(e.message) + '</p>'; }
        }

        // --- Paper List ---
        async function loadPapers() {
            try {
                const res = await fetch('/api/papers');
                if (!res.ok) return;
                const papers = await res.json();
                const list = document.getElementById('papersList');
                if (papers.length === 0) {
                    list.innerHTML = '<li class="empty-state"><p>还没有导入论文。请在上方上传 PDF。</p></li>';
                    document.getElementById('paperDetail').style.display = 'none';
                } else {
                    list.innerHTML = papers.map(p => `
                        <li class="paper-item" onclick="viewPaper('${p.id}')" style="cursor:pointer;">
                            <div class="paper-info">
                                <div class="paper-title">${esc(p.title || '（未命名）')}</div>
                                <div class="paper-meta">
                                    ${p.authors ? esc(p.authors) + ' · ' : ''}
                                    ${p.year || ''}
                                    导入：${p.imported_at}
                                    <span class="parse-badge parse-${p.parse_status}">${tParseStatus(p.parse_status)}</span>
                                </div>
                            </div>
                        </li>
                    `).join('');
                }
            } catch (e) { /* silently ignore */ }
        }

        // --- Paper Detail & Edit ---
        let currentPaper = null;

        async function viewPaper(paperId) {
            try {
                const res = await fetch('/api/papers/' + paperId);
                if (!res.ok) return;
                currentPaper = await res.json();
                const detail = document.getElementById('paperDetail');
                document.getElementById('paperDetailTitle').textContent = currentPaper.title || '（未命名）';
                document.getElementById('editTitle').value = currentPaper.title || '';
                document.getElementById('editAuthors').value = currentPaper.authors || '';
                document.getElementById('editYear').value = currentPaper.year || '';
                document.getElementById('editDoi').value = currentPaper.doi || '';
                document.getElementById('editArxiv').value = currentPaper.arxiv_id || '';
                document.getElementById('editPubmed').value = currentPaper.pubmed_id || '';
                document.getElementById('editVenue').value = currentPaper.venue || '';
                document.getElementById('editAbstract').value = currentPaper.abstract || '';
                document.getElementById('editCitation').value = currentPaper.citation || '';
                document.getElementById('editTags').value = currentPaper.user_tags || '';
                document.getElementById('editRelation').value = currentPaper.relation_to_idea || 'unclassified';
                document.getElementById('paperParseStatus').textContent =
                    '解析状态：' + tParseStatus(currentPaper.parse_status);
                detail.style.display = 'block';
                await loadPaperPassages(paperId); await loadPaperCards(paperId);
                detail.scrollIntoView({ behavior: 'smooth' });
            } catch (e) { showError(e.message); }
        }

        async function loadPaperPassages(paperId) {
            try {
                const res = await fetch('/api/papers/' + paperId + '/passages');
                const passages = res.ok ? await res.json() : [];
                const list = document.getElementById('passagesList');
                if (passages.length === 0) {
                    list.innerHTML = '<p style="color:#999;font-size:0.85rem;">还没有原文片段。点击“解析 PDF”提取文本。</p>';
                } else {
                    list.innerHTML = passages.map(p => `
                        <div style="border:1px solid #eee; border-radius:6px; padding:10px; margin-bottom:8px;">
                            <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px;">
                                <span class="parse-badge" style="background:#e3f2fd;color:#1565c0;">${esc(tSection(p.section))}</span>
                                <span class="parse-badge" style="background:#f3e5f5;color:#7b1fa2;">${esc(tSection(p.passage_type))}</span>
                                <span style="font-size:0.78rem;color:#999;">第 ${p.page_number} 页 · 第 ${p.paragraph_index} 段</span>
                            </div>
                            <div style="font-size:0.85rem; line-height:1.5; white-space:pre-wrap;">${esc(p.original_text)}</div>
                        </div>
                    `).join('');
                }
            } catch (e) { /* ignore */ }
        }


        // --- Knowledge Cards ---
        async function loadPaperCards(paperId) {
            try {
                const res = await fetch('/api/cards?paper_id=' + paperId);
                const cards = res.ok ? await res.json() : [];
                const list = document.getElementById('cardsList');
                if (cards.length === 0) {
                    list.innerHTML = '<p style="color:#999;font-size:0.85rem;">还没有知识卡片。</p>';
                } else {
                    list.innerHTML = cards.map(c => `
                        <div style="border:1px solid #eee; border-radius:6px; padding:8px 10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:flex-start;">
                            <div style="flex:1;">
                                <span class="parse-badge" style="background:#e8f5e9;color:#2e7d32;">${esc(tCardType(c.card_type))}</span>
                                ${c.source_passage_id ? '<span class="parse-badge" style="background:#fff3e0;color:#e65100;margin-left:4px;">有来源</span>' : ''}
                                <span style="font-size:0.78rem;color:#999;">置信度：${c.confidence.toFixed(2)}</span>
                                <div style="font-size:0.85rem; margin-top:4px;">${esc(c.summary)}</div>
                            </div>
                            <button class="btn-danger btn-sm" onclick="deleteCard('${c.id}')" style="margin-left:8px;">×</button>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        function showCreateCard() {
            document.getElementById('cardCreateForm').style.display = 'block';
        }

        async function createCard() {
            if (!currentPaper) return;
            const body = {
                paper_id: currentPaper.id,
                card_type: document.getElementById('newCardType').value,
                summary: document.getElementById('newCardSummary').value.trim(),
                confidence: 1.0
            };
            if (!body.summary) { showError('请填写摘要。'); return; }
            try {
                const res = await fetch('/api/cards', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail); }
                document.getElementById('cardCreateForm').style.display = 'none';
                document.getElementById('newCardSummary').value = '';
                await loadPaperCards(currentPaper.id);
            } catch (e) { showError(e.message); }
        }


        async function extractCards() {
            if (!currentPaper) return;
            try {
                const res = await fetch('/api/cards/extract/' + currentPaper.id, { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Extraction failed');
                alert('已抽取 ' + data.card_count + ' 张卡片。');
                await loadPaperCards(currentPaper.id);
            } catch (e) { showError(e.message); }
        }

        async function deleteCard(cardId) {
            if (!confirm('要删除这张卡片吗？')) return;
            try {
                await fetch('/api/cards/' + cardId, { method: 'DELETE' });
                if (currentPaper) await loadPaperCards(currentPaper.id);
            } catch (e) { showError(e.message); }
        }

        async function parsePaper() {
            if (!currentPaper) return;
            document.getElementById('paperParseStatus').textContent = '正在解析...';
            try {
                const res = await fetch('/api/papers/' + currentPaper.id + '/parse', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Parse failed');
                document.getElementById('paperParseStatus').textContent =
                    '解析状态：已解析（' + data.passage_count + ' 个片段）';
                await loadPaperPassages(currentPaper.id);
            } catch (e) {
                document.getElementById('paperParseStatus').textContent = '解析失败：' + e.message;
            }
        }

        async function savePaperMeta() {
            if (!currentPaper) return;
            try {
                const body = {
                    title: document.getElementById('editTitle').value,
                    authors: document.getElementById('editAuthors').value,
                    year: parseInt(document.getElementById('editYear').value) || null,
                    doi: document.getElementById('editDoi').value,
                    arxiv_id: document.getElementById('editArxiv').value,
                    pubmed_id: document.getElementById('editPubmed').value,
                    venue: document.getElementById('editVenue').value,
                    abstract: document.getElementById('editAbstract').value,
                    citation: document.getElementById('editCitation').value,
                    user_tags: document.getElementById('editTags').value,
                    relation_to_idea: document.getElementById('editRelation').value,
                };
                const res = await fetch('/api/papers/' + currentPaper.id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || 'Save failed');
                }
                currentPaper = await res.json();
                document.getElementById('paperDetailTitle').textContent = currentPaper.title || '（未命名）';
                await loadPapers();
                showError(''); // clear any previous error
            } catch (e) { showError(e.message); }
        }


        // --- Structured Views ---
        async function showCardView(cardType) {
            // Update tabs
            document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const container = document.getElementById('structuredViewContent');
            container.innerHTML = '<p style="color:#999;">正在加载...</p>';
            try {
                const res = await fetch('/api/cards?card_type=' + encodeURIComponent(cardType));
                if (!res.ok) { container.innerHTML = '<p style="color:#999;">还没有打开的空间。</p>'; return; }
                const cards = await res.json();
                if (cards.length === 0) {
                    container.innerHTML = '<p style="color:#999;">当前空间没有“' + tCardType(cardType) + '”卡片。</p>';
                    return;
                }
                container.innerHTML = cards.map(c => `
                    <div style="border:1px solid #e0e0e0; border-radius:6px; padding:10px; margin-bottom:6px;">
                        <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px;">
                            <span class="parse-badge" style="background:#e8f5e9;color:#2e7d32;">${esc(tCardType(c.card_type))}</span>
                            <span style="font-size:0.85rem; font-weight:600;">${esc(c.summary.substring(0, 80))}${c.summary.length > 80 ? '...' : ''}</span>
                            <span style="font-size:0.75rem;color:#999;">置信度：${c.confidence.toFixed(2)}</span>
                        </div>
                        <div style="font-size:0.85rem; color:#666;">${esc(c.summary)}</div>
                        ${c.source_passage_id ? '<a href="#" onclick="viewPaper(\'' + c.paper_id + '\')" style="font-size:0.78rem;color:#1976d2;">打开论文 &rarr;</a>' : ''}
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = '<p style="color:#c62828;">加载失败。</p>'; }
        }

        // --- Agent Access ---
        async function loadAgentStatus() {
            try {
                const res = await fetch('/api/agent/status');
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('agentToggle').checked = data.enabled;
                document.getElementById('agentExposedSpace').textContent =
                    data.active_space ? data.active_space.name : '无';
                document.getElementById('agentExposedSpace').style.color =
                    data.enabled ? '#0d47a1' : '#999';
            } catch (e) { /* ignore */ }
        }

        async function toggleAgentAccess() {
            const enabled = document.getElementById('agentToggle').checked;
            try {
                await fetch('/api/agent/status', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled })
                });
                await loadAgentStatus();
            } catch (e) { showError('更新智能代理访问状态失败。'); }
        }

        // --- Update loadSpaces to show/hide papers section ---
        const originalLoadSpaces = loadSpaces;
        loadSpaces = async function() {
            await originalLoadSpaces();
            await loadAgentStatus();
            // Show papers section only if there's an active space
            try {
                const aRes = await fetch('/api/spaces/active');
                document.getElementById('papersSection').style.display = aRes.ok ? 'block' : 'none'; document.getElementById('structuredViews').style.display = aRes.ok ? 'block' : 'none';
                if (aRes.ok) await loadPapers();
            } catch (e) {
                document.getElementById('papersSection').style.display = 'none';
            }
        };

        // Initial load
        loadSpaces();
    </script>
</body>
</html>
